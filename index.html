<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annuaire KPI — IDEA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo-wrap">
        <img src="assets/logo-idea.png" alt="IDEA" class="login-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
        <div class="login-logo-fallback" style="display:none">IDEA</div>
      </div>
      <p class="login-tagline">Plateforme de pilotage KPI</p>
    </div>
    <div class="login-form">
      <label for="usernameInput">Identifiant</label>
      <input type="text" id="usernameInput" placeholder="Nom ou adresse email" autocomplete="username">
      <button id="loginBtn">
        <span>Se connecter</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
  <div class="login-bg-shapes">
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" style="display:none">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <img src="assets/logo-idea.png" alt="IDEA" class="sidebar-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
      <div class="sidebar-logo-fallback" style="display:none">IDEA</div>
      <span class="sidebar-title">Annuaire KPI</span>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-details">
        <span class="user-name" id="userInfo">—</span>
        <span class="user-role">Utilisateur</span>
      </div>
      <button id="logoutBtn" title="Déconnexion" class="btn-logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Vues</div>
      <button class="nav-btn active" data-view="all" onclick="switchView('all', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Tous les KPIs
        <span class="nav-count" id="countAll">0</span>
      </button>
      <button class="nav-btn" data-view="fav" onclick="switchView('fav', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Favoris
        <span class="nav-count" id="countFav">0</span>
      </button>
    </nav>

    <div class="sidebar-filters">
      <div class="nav-section-label">Filtres</div>

      <div class="filter-group">
        <label>Processus</label>
        <select id="processFilter">
          <option value="">Tous</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Fréquence</label>
        <select id="freqFilter">
          <option value="">Toutes</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Rituel</label>
        <select id="ritualFilter">
          <option value="">Tous</option>
        </select>
      </div>

      <button class="btn-reset" onclick="resetFilters()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
        Réinitialiser
      </button>
    </div>

    <div class="sidebar-footer">
      <label class="btn-upload" for="fileInput">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importer Excel
      </label>
      <button class="btn-refresh" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
        Rafraîchir
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- TOP BAR -->
    <div class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Rechercher un KPI, une description…">
        <span class="search-count" id="searchCount"></span>
      </div>
      <div class="topbar-right">
        <span class="topbar-badge" id="topbarBadge"></span>
      </div>
    </div>

    <!-- KPI GRID -->
    <main id="kpiContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📊</div>
        <h3>Aucun KPI chargé</h3>
        <p>Importez votre fichier Excel pour commencer</p>
      </div>
    </main>

  </div>
</div>

<!-- INPUT FILE CACHÉ -->
<input type="file" id="fileInput" accept=".xlsx" style="display:none">

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
