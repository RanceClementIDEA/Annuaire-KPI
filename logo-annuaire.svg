<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Annuaire KPI — IDEA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2D3E"/>
      <stop offset="1" stop-color="#06202E"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00C4CC"/>
      <stop offset="1" stop-color="#5FE3E8"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- Dos de l'annuaire -->
  <rect x="13" y="13" width="6" height="38" rx="2.5" fill="#00C4CC" opacity=".55"/>

  <!-- Corps de l'annuaire -->
  <rect x="19" y="13" width="30" height="38" rx="3.5" fill="#F0F6FA"/>

  <!-- Onglets d'index (répertoire) -->
  <rect x="45" y="18" width="8" height="5" rx="2.5" fill="#00C4CC"/>
  <rect x="45" y="27" width="8" height="5" rx="2.5" fill="#FFB020"/>
  <rect x="45" y="36" width="8" height="5" rx="2.5" fill="#00C4CC" opacity=".6"/>

  <!-- Barres KPI -->
  <rect x="24" y="36" width="5"  height="9"  rx="1.6" fill="url(#acc)"/>
  <rect x="31.5" y="30" width="5" height="15" rx="1.6" fill="url(#acc)"/>
  <rect x="39" y="24" width="5"  height="21" rx="1.6" fill="#FFB020"/>

  <!-- Courbe de tendance -->
  <path d="M24.5 32 L34 25.5 L41.5 20" fill="none" stroke="#06202E" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" opacity=".28"/>

  <!-- Étincelle « idée » -->
  <circle cx="41.5" cy="20" r="3.4" fill="#FFB020" stroke="#F0F6FA" stroke-width="1.6"/>
</svg>
